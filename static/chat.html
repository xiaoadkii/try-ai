<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>try-ai 聊天面板</title>
<style>
  :root {
    --bg: #1a1a2e;
    --surface: #16213e;
    --primary: #0f3460;
    --accent: #e94560;
    --text: #eee;
    --text-dim: #999;
    --user-bubble: #533483;
    --assistant-bubble: #1e3a5f;
    --tool-bubble: #2d5a27;
    --border: #2a2a4a;
    --input-bg: #0d1117;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    display: flex;
    flex-direction: column;
  }

  /* ====== Header ====== */
  header {
    background: var(--surface);
    padding: 12px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  header h1 {
    font-size: 18px;
    font-weight: 600;
    background: linear-gradient(135deg, var(--accent), #f5a623);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .header-badges {
    display: flex;
    gap: 8px;
    align-items: center;
  }
  .badge {
    font-size: 11px;
    padding: 3px 10px;
    border-radius: 12px;
    background: var(--primary);
    color: var(--text-dim);
    cursor: pointer;
    border: 1px solid transparent;
    transition: all .2s;
    white-space: nowrap;
  }
  .badge:hover { border-color: var(--accent); color: var(--text); }
  .badge.active { background: var(--accent); color: #fff; border-color: var(--accent); }
  #sessionDisplay {
    font-size: 11px;
    color: var(--text-dim);
    font-family: monospace;
    max-width: 200px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  /* ====== Messages ====== */
  main {
    flex: 1;
    overflow-y: auto;
    padding: 16px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }
  .message {
    display: flex;
    flex-direction: column;
    max-width: 85%;
    animation: fadeIn .3s ease;
  }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } }
  .message.user { align-self: flex-end; }
  .message.assistant { align-self: flex-start; }
  .message.tool { align-self: flex-start; }

  .msg-role {
    font-size: 10px;
    color: var(--text-dim);
    margin-bottom: 2px;
    padding: 0 6px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .msg-bubble {
    padding: 10px 14px;
    border-radius: 14px;
    line-height: 1.55;
    font-size: 14px;
    word-break: break-word;
  }
  .message.user .msg-bubble {
    background: var(--user-bubble);
    border-bottom-right-radius: 4px;
  }
  .message.assistant .msg-bubble {
    background: var(--assistant-bubble);
    border-bottom-left-radius: 4px;
  }
  .message.tool .msg-bubble {
    background: var(--tool-bubble);
    border: 1px dashed #4a8;
    font-family: monospace;
    font-size: 12px;
    border-radius: 8px;
    opacity: 0.85;
    white-space: pre-wrap;
  }

  /* streaming cursor */
  .streaming .msg-bubble::after {
    content: ' ▌';
    animation: blink 1s step-end infinite;
  }
  @keyframes blink { 50% { opacity: 0; } }

  /* loading dots */
  .loading-dots {
    align-self: flex-start;
    padding: 10px 16px;
    background: var(--assistant-bubble);
    border-radius: 14px;
    border-bottom-left-radius: 4px;
  }
  .loading-dots span {
    display: inline-block;
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-dim);
    margin: 0 2px;
    animation: dotBounce 1.4s infinite ease-in-out both;
  }
  .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
  .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
  @keyframes dotBounce {
    0%, 80%, 100% { transform: scale(0); }
    40% { transform: scale(1); }
  }

  /* ====== Footer / Input ====== */
  footer {
    background: var(--surface);
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
    display: flex;
    gap: 10px;
    align-items: flex-end;
  }
  textarea {
    flex: 1;
    background: var(--input-bg);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 14px;
    font-family: inherit;
    resize: none;
    outline: none;
    min-height: 42px;
    max-height: 120px;
    line-height: 1.4;
    transition: border-color .2s;
  }
  textarea:focus { border-color: var(--accent); }
  button {
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 10px 18px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s;
    white-space: nowrap;
  }
  button:hover { opacity: 0.9; transform: scale(1.02); }
  button:disabled {
    opacity: 0.4;
    cursor: not-allowed;
    transform: none;
  }

  /* quick prompts */
  .quick-prompts {
    display: flex;
    gap: 6px;
    padding: 6px 20px 0;
    flex-wrap: wrap;
  }
  .quick-prompts button {
    background: var(--primary);
    font-size: 12px;
    font-weight: 400;
    padding: 5px 12px;
    border-radius: 14px;
  }

  /* scrollbar */
  main::-webkit-scrollbar { width: 6px; }
  main::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
</style>
</head>
<body>

<header>
  <h1>⚡ try-ai 聊天</h1>
  <div class="header-badges">
    <span id="sessionDisplay" title="点击复制 Session ID">🆔 ...</span>
    <span class="badge active" data-mode="rag" onclick="switchMode('rag')">🧠 RAG 检索</span>
    <span class="badge" data-mode="fc" onclick="switchMode('fc')">🔧 FC</span>
    <span class="badge" data-mode="stream" onclick="switchMode('stream')">📡 流式</span>
    <span class="badge" data-mode="normal" onclick="switchMode('normal')">📦 普通</span>
    <span class="badge" onclick="clearSession()" title="新建会话">🔄 新会话</span>
  </div>
</header>

<div class="quick-prompts">
  <button onclick="sendQuick('我是 u1，今天吃了多少蛋白质？')">🥩 蛋白质查询</button>
  <button onclick="sendQuick('我（u1）这周练了几天了？')">🏋️ 锻炼天数</button>
  <button onclick="sendQuick('你好，我叫张三，我是做什么的？')">💬 普通对话</button>
</div>

<main id="messages">
  <div style="text-align:center;color:var(--text-dim);padding:40px 0;">
    👋 选择一个快捷提示或输入消息开始<br>
    <span style="font-size:12px">Function Calling 模式：大模型会自动调用后端工具查询真实数据</span>
  </div>
</main>

<footer>
  <textarea id="input"
    placeholder="输入消息… (Enter 发送，Shift+Enter 换行)"
    rows="1"
    onkeydown="handleKey(event)"
  ></textarea>
  <button id="sendBtn" onclick="send()">发送</button>
</footer>

<script>
// ============================================================
// 状态管理
// ============================================================
let mode = 'rag';                         // rag | fc | stream | normal
let sessionId = localStorage.getItem('tryai_session') || '';
const API = 'http://127.0.0.1:8000';
let isStreaming = false;

// mode → {endpoint, streaming}
const MODE_CONFIG = {
  rag:    { endpoint: '/v1/chat/rag',    streaming: true  },
  fc:     { endpoint: '/v1/chat/fc',     streaming: true  },
  stream: { endpoint: '/v1/chat/stream', streaming: true  },
  normal: { endpoint: '/v1/chat',        streaming: false },
};

// ============================================================
// UI 工具函数
// ============================================================
const $ = (s) => document.querySelector(s);
const main = $('#messages');
const input = $('#input');
const sendBtn = $('#sendBtn');

function switchMode(m) {
  mode = m;
  document.querySelectorAll('.badge[data-mode]').forEach(b => {
    b.classList.toggle('active', b.dataset.mode === m);
  });
  updatePlaceholder();
}

function updatePlaceholder() {
  const hints = {
    rag: 'RAG 模式 — 先查知识库再回答，不瞎编…',
    fc: 'Function Calling 模式 — 试试问健身数据…',
    stream: '流式模式 — 常规对话，打字机效果',
    normal: '普通模式 — 一次性返回，无历史记录',
  };
  input.placeholder = hints[mode] || '';
}

function scrollBottom() {
  main.scrollTop = main.scrollHeight;
}

function showLoading() {
  const div = document.createElement('div');
  div.className = 'loading-dots';
  div.id = 'loader';
  div.innerHTML = '<span></span><span></span><span></span>';
  main.appendChild(div);
  scrollBottom();
}

function hideLoading() {
  const loader = document.getElementById('loader');
  if (loader) loader.remove();
}

function updateSessionDisplay() {
  const el = $('#sessionDisplay');
  if (sessionId) {
    el.textContent = '🆔 ' + sessionId.substring(0, 8) + '…';
    el.title = 'Session: ' + sessionId + '\n点击复制';
    el.style.cursor = 'pointer';
    el.onclick = () => {
      navigator.clipboard.writeText(sessionId);
      el.textContent = '✅ 已复制!';
      setTimeout(() => updateSessionDisplay(), 1500);
    };
  } else {
    el.textContent = '🆔 新会话';
    el.title = '';
  }
}

// ============================================================
// 消息渲染
// ============================================================
function addMsg(role, text, opts = {}) {
  const div = document.createElement('div');
  div.className = `message ${role}`;
  if (opts.streaming) div.classList.add('streaming');

  const label = document.createElement('div');
  label.className = 'msg-role';
  const labels = { user: '🧑 You', assistant: '🤖 AI', tool: '🔧 Tool Call' };
  label.textContent = labels[role] || role;
  div.appendChild(label);

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';
  // 支持 markdown 风格的 **bold** 和 emoji
  bubble.innerHTML = escapeHtml(text)
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/`(.+?)`/g, '<code>$1</code>');
  div.appendChild(bubble);

  if (opts.id) div.id = opts.id;

  main.appendChild(div);
  scrollBottom();
  return { div, bubble };
}

function escapeHtml(s) {
  const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' };
  return s.replace(/[&<>"']/g, c => map[c]);
}

// 清屏（保留系统欢迎语）
function clearScreen() {
  main.innerHTML = '';
}

// ============================================================
// SSE 流式读取（fetch + ReadableStream）
// ============================================================
// EventSource 只支持 GET，所以用 fetch + reader 手动解析 SSE 流。
//
// SSE 格式：每行以 "data: " 开头，以 "\n\n" 结尾。
// 我们的后端约定：
//   data: {"delta":"文本","session_id":"..."}
//   data: [DONE]
//
// ★ 对照 Java：
//   这里相当于 WebClient 订阅 Flux<ServerSentEvent> 的 onNext / onComplete 回调，
//   但 JavaScript 用 ReadableStream API 手动拆包，更底层。
async function* readSSE(response) {
  const reader = response.body.getReader();
  const decoder = new TextDecoder();
  let buffer = '';

  while (true) {
    const { done, value } = await reader.read();
    if (done) break;

    buffer += decoder.decode(value, { stream: true });
    const lines = buffer.split('\n');
    // 最后一行可能不完整，保留到下次循环
    buffer = lines.pop() || '';

    for (const line of lines) {
      if (!line.startsWith('data: ')) continue;
      const payload = line.slice(6).trim();
      if (!payload) continue;
      if (payload === '[DONE]') return;
      try {
        yield JSON.parse(payload);
      } catch (_) {
        // 忽略解析失败的行
        console.warn('SSE parse skip:', payload.substring(0, 40));
      }
    }
  }
}

// ============================================================
// 发送消息
// ============================================================
async function send() {
  const prompt = input.value.trim();
  if (!prompt || isStreaming) return;
  sendInternal(prompt);
}

async function sendQuick(prompt) {
  if (isStreaming) return;
  sendInternal(prompt);
}

async function sendInternal(prompt) {
  isStreaming = true;
  sendBtn.disabled = true;
  input.value = '';
  input.style.height = 'auto';

  // 首次发送自动生成 session_id
  if (!sessionId) {
    sessionId = 'web-' + crypto.randomUUID();
    localStorage.setItem('tryai_session', sessionId);
    updateSessionDisplay();
  }

  const config = MODE_CONFIG[mode];

  // ---- 渲染用户消息 ----
  clearScreen();  // 可根据喜好注释掉，保留历史消息
  addMsg('user', prompt);

  // ---- 非流式路径（/v1/chat）----
  if (!config.streaming) {
    showLoading();
    try {
      const res = await fetch(API + config.endpoint, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ prompt }),
      });
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      hideLoading();
      addMsg('assistant', data.reply || '(空回复)');
    } catch (e) {
      hideLoading();
      addMsg('assistant', `❌ 请求失败: ${e.message}`);
    }
    finishSend();
    return;
  }

  // ---- 流式路径（/v1/chat/stream 或 /v1/chat/fc）----
  showLoading();
  let streamMsg = null;  // 流式消息 DOM 引用

  try {
    const res = await fetch(API + config.endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ prompt, session_id: sessionId }),
    });

    if (!res.ok) {
      hideLoading();
      addMsg('assistant', `❌ 请求失败: HTTP ${res.status}`);
      finishSend();
      return;
    }

    // 从响应头获取 session_id（后端首次返回时带在 X-Session-Id 头里）
    const newSid = res.headers.get('X-Session-Id');
    if (newSid && newSid !== sessionId) {
      sessionId = newSid;
      localStorage.setItem('tryai_session', sessionId);
      updateSessionDisplay();
    }

    // ---- 逐块消费 SSE 流 ----
    let fullText = '';
    for await (const event of readSSE(res)) {
      hideLoading();  // 第一个 chunk 到达时隐藏 loading

      if (event.error) {
        streamMsg?.bubble && (streamMsg.bubble.textContent += `\n❌ ${event.error}`);
        continue;
      }

      const delta = event.delta;
      if (delta == null) continue;

      // 更新 session_id
      if (event.session_id && event.session_id !== sessionId) {
        sessionId = event.session_id;
        localStorage.setItem('tryai_session', sessionId);
        updateSessionDisplay();
      }

      fullText += delta;

      if (!streamMsg) {
        // 第一个 delta chunk → 创建助手消息气泡
        streamMsg = addMsg('assistant', delta, { streaming: true, id: 'stream-msg' });
      } else {
        // 后续 chunk → 追加到已有气泡
        streamMsg.bubble.innerHTML = escapeHtml(fullText)
          .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
          .replace(/`(.+?)`/g, '<code>$1</code>');
        scrollBottom();
      }
    }

    // ---- 流结束 ----
    if (streamMsg) {
      streamMsg.div.classList.remove('streaming');
    } else if (!fullText) {
      // 没有任何文本输出（可能是纯 tool 调用中间态，前端不需要显示）
      // 不做任何事
    }

  } catch (e) {
    hideLoading();
    addMsg('assistant', `❌ 连接中断: ${e.message}`);
  }

  finishSend();
}

function finishSend() {
  isStreaming = false;
  sendBtn.disabled = false;
  input.focus();
}

// ============================================================
// 键盘事件
// ============================================================
function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

// 自动调整 textarea 高度
input.addEventListener('input', () => {
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// ============================================================
// 会话管理
// ============================================================
function clearSession() {
  sessionId = '';
  localStorage.removeItem('tryai_session');
  updateSessionDisplay();
  clearScreen();
  main.innerHTML = `
    <div style="text-align:center;color:var(--text-dim);padding:40px 0;">
      👋 新会话已创建<br>
      <span style="font-size:12px">Function Calling 模式：大模型会自动调用后端工具查询真实数据</span>
    </div>`;
}

// ============================================================
// 初始化
// ============================================================
updatePlaceholder();
updateSessionDisplay();
</script>
</body>
</html>
